<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Website</title>
    
    <!-- 这里是 CSS 样式区域，负责把网页变漂亮 -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }
        
        header nav a:hover {
            color: #3498db;
        }

        .hero {
            background-image: url('images/UM(1).jpg'); 
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.5); 
            background-blend-mode: overlay;
        }

        .hero h1 {
            font-size: 48px;
            margin: 0 0 10px 0;
        }

        .hero p {
            font-size: 20px;
        }

        .intro {
            padding: 50px;
            text-align: center;
            background-color: #f9f9f9;
            flex-grow: 1;
        }

        .intro h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .intro p {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
            color: #555;
        }

        footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div></div>
        <nav>
            <a href="index.html">About</a>
            <a href="Members.html">Members</a>
            <a href="News.html">News</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <!-- 第二部分：主图与大标题 -->
    <div class="hero">
        <h1>Welcome to Intelligent Unmanned Systems Laboratory</h1>
        <p>Innovation, Quality, and Excellence integrated into one platform.</p>
    </div>

    <!-- 第三部分：简介内容 -->
    <div class="intro">
        <h2>Who We Are</h2>
        <p>
            111
        </p>
    </div>

    <!-- 第四部分：尾部声明 -->
    <footer>
        &copy; 2026 
    </footer>

</body>
</html>
